name: Mechanex CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop
  workflow_dispatch:

jobs:
  quality:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check mechanex tests

      - name: Type check
        run: mypy

      - name: Unit tests + coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=70

  integration:
    runs-on: self-hosted
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    env:
      MECHANEX_INTEGRATION_BASE_URL: ${{ secrets.MECHANEX_INTEGRATION_BASE_URL }}
      MECHANEX_INTEGRATION_API_KEY: ${{ secrets.MECHANEX_INTEGRATION_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Integration tests
        run: python -m unittest discover -s tests/integration -v
