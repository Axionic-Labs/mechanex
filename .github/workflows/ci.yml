name: Mechanex CI

on:
  pull_request:
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**/*.md'
      - '.vscode/**'
      - '.editorconfig'
      - '.env.example'
      - 'CLAUDE.md'
      - 'LICENSE'
  push:
    branches:
      - main
      - master
      - develop
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - '.github/**/*.md'
      - '.vscode/**'
      - '.editorconfig'
      - '.env.example'
      - 'CLAUDE.md'
      - 'LICENSE'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check mechanex tests

      - name: Type check
        run: mypy

      - name: Fetch latest backend OpenAPI spec
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p tests/fixtures
          gh api "repos/Axionic-Labs/axionic-mvp-backend/contents/openapi.json?ref=development" \
            --jq '.content' | base64 -d > tests/fixtures/backend-openapi.json || {
            echo "::warning::Could not fetch latest OpenAPI spec -- using committed fixture"
          }

      - name: Unit tests + coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=70

  integration:
    runs-on: self-hosted
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    env:
      MECHANEX_INTEGRATION_BASE_URL: ${{ secrets.MECHANEX_INTEGRATION_BASE_URL }}
      MECHANEX_INTEGRATION_API_KEY: ${{ secrets.MECHANEX_INTEGRATION_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Integration tests
        run: python -m unittest discover -s tests/integration -v
