name: Mechanex CI

on:
  pull_request:

      - name: Slack alert on failure
        if: failure()
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
        run: |
          BRANCH="${GITHUB_REF_NAME}"
          if [[ "$BRANCH" == "main" || "$BRANCH" == "master" ]]; then
            CHANNEL="${{ secrets.SLACK_CHANNEL_PROD_ERRORS }}"
          else
            CHANNEL="${{ secrets.SLACK_CHANNEL_DEV_ERRORS }}"
          fi
          [ -z "$CHANNEL" ] && exit 0
          curl -sf -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\":\"$CHANNEL\",\"text\":\":red_circle: CI failed: $GITHUB_WORKFLOW on ${GITHUB_REPOSITORY#*/} ($BRANCH)\"}" > /dev/null

  push:
    branches:
      - main
      - development
  workflow_dispatch:

jobs:
  quality:
    runs-on: self-hosted
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint
        run: ruff check mechanex tests

      - name: Type check
        run: mypy

      - name: Unit tests + coverage
        run: |
          coverage run -m unittest discover -s tests -v
          coverage report --fail-under=70

  integration:
    runs-on: self-hosted
    timeout-minutes: 20
    if: github.event_name == 'workflow_dispatch'
    env:
      MECHANEX_INTEGRATION_BASE_URL: ${{ secrets.MECHANEX_INTEGRATION_BASE_URL }}
      MECHANEX_INTEGRATION_API_KEY: ${{ secrets.MECHANEX_INTEGRATION_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Integration tests
        run: python -m unittest discover -s tests/integration -v
