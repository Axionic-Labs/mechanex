name: Changelog Check

on:
  pull_request:
    branches: [main, development]

jobs:
  changelog:
    name: Changelog Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for CHANGELOG.md changes
        env:
          GH_TOKEN: ${{ github.token }}
          BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          changed=$(git diff --name-only origin/$BASE_REF...HEAD -- CHANGELOG.md)
          if [ -z "$changed" ]; then
            if [ "$BASE_REF" = "main" ]; then
              echo "::error::CHANGELOG.md was not updated. All PRs to main must include a changelog entry."
              exit 1
            else
              echo "::warning::CHANGELOG.md was not updated. Consider adding a changelog entry."
              gh pr comment "$PR_NUMBER" --body "**Changelog reminder**: this PR does not include a CHANGELOG.md update. Consider adding one before merging." --edit-last 2>/dev/null || \
              gh pr comment "$PR_NUMBER" --body "**Changelog reminder**: this PR does not include a CHANGELOG.md update. Consider adding one before merging."
            fi
          else
            echo "CHANGELOG.md was updated."
          fi
