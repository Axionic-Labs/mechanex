name: Weekly Release Train

on:
  schedule:
    - cron: '0 16 * * 1'
  workflow_dispatch:

concurrency:
  group: release-train-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read
  pull-requests: write

jobs:
  release-pr:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Open or refresh staging -> main PR
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'staging';
            const base = 'main';
            const title = 'release: staging -> main';
            const body = [
              'Automated weekly release-train PR.',
              '',
              '- Source branch: `staging`',
              '- Target branch: `main`',
              '- Intended merge path: review + queue on `main`',
            ].join('\n');

            async function branchExists(branch) {
              try {
                await github.rest.repos.getBranch({ owner, repo, branch });
                return true;
              } catch (error) {
                if (error.status === 404) return false;
                throw error;
              }
            }

            if (!(await branchExists(head))) {
              core.notice(`Skipping because ${head} does not exist yet.`);
              return;
            }

            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${head}`,
            });

            if (comparison.data.ahead_by === 0) {
              core.notice(`${head} is not ahead of ${base}; nothing to release.`);
              return;
            }

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head: `${owner}:${head}`,
              per_page: 100,
            });

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title,
                body,
              });
              core.notice(`Updated PR #${existing[0].number}.`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
            });

            core.notice(`Created PR #${created.data.number}.`);
