name: Sync Development To Staging

on:
  push:
    branches:
      - development
  workflow_dispatch:

concurrency:
  group: sync-staging-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  sync-pr:
    runs-on: [self-hosted, linux, x64]
    steps:
      - name: Open or refresh development -> staging PR
        uses: actions/github-script@v8
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const head = 'development';
            const base = 'staging';
            const title = 'chore: sync development into staging';
            const body = [
              'Automated sync PR for the staging merge queue.',
              '',
              '- Source branch: `development`',
              '- Target branch: `staging`',
              '- Intended merge path: review + queue on `staging`',
            ].join('\n');

            async function branchExists(branch) {
              try {
                await github.rest.repos.getBranch({ owner, repo, branch });
                return true;
              } catch (error) {
                if (error.status === 404) return false;
                throw error;
              }
            }

            if (!(await branchExists(base))) {
              core.notice(`Skipping because ${base} does not exist yet.`);
              return;
            }

            const comparison = await github.rest.repos.compareCommitsWithBasehead({
              owner,
              repo,
              basehead: `${base}...${head}`,
            });

            if (comparison.data.ahead_by === 0) {
              core.notice(`${head} is not ahead of ${base}; nothing to promote.`);
              return;
            }

            const { data: existing } = await github.rest.pulls.list({
              owner,
              repo,
              state: 'open',
              base,
              head: `${owner}:${head}`,
              per_page: 100,
            });

            if (existing.length > 0) {
              await github.rest.pulls.update({
                owner,
                repo,
                pull_number: existing[0].number,
                title,
                body,
              });
              core.notice(`Updated PR #${existing[0].number}.`);
              return;
            }

            const created = await github.rest.pulls.create({
              owner,
              repo,
              title,
              head,
              base,
              body,
            });

            core.notice(`Created PR #${created.data.number}.`);
